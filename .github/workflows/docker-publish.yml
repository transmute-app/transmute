name: Docker Publish

on:
  workflow_call:
    inputs:
      version_tag:
        description: Semantic version tag to publish, for example v1.2.3
        required: false
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PUBLIC_RO_TOKEN:
        required: true
      DOCKER_PUBLIC_RW_TOKEN:
        required: true
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - '.github/workflows/docker-publish.yml'
      - 'docker/**'
      - 'frontend/**'
      - 'backend/**'
      - 'docker/**'
      - 'requirements.txt'

env:
  DOCKER_HUB_NAMESPACE: neonvariant
  DOCKER_HUB_REPOSITORY: transmute

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version_tag != '' && inputs.version_tag || github.ref }}
  cancel-in-progress: ${{ inputs.version_tag == '' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.version_tag != '' && format('refs/tags/{0}', inputs.version_tag) || github.ref }}

      - name: Resolve build version
        id: release_context
        env:
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
        shell: bash
        run: |
          if [[ -n "$INPUT_VERSION_TAG" ]]; then
            BUILD_VERSION="$INPUT_VERSION_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            BUILD_VERSION="${GITHUB_REF_NAME}"
          else
            BUILD_VERSION="${GITHUB_SHA::7}"
          fi
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0
        with:
          platforms: ${{ matrix.platform }}

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PUBLIC_RO_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_VERSION=${{ steps.release_context.outputs.build_version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.release_context.outputs.build_date }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,oci-mediatypes=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false
          sbom: false

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          digest="$DIGEST"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge and Push
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.version_tag != '' && format('refs/tags/{0}', inputs.version_tag) || github.ref }}

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Resolve release context
        id: release_context
        env:
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
        shell: bash
        run: |
          if [[ -n "$INPUT_VERSION_TAG" ]]; then
            VERSION_TAG="$INPUT_VERSION_TAG"
            BUILD_VERSION="$INPUT_VERSION_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
            BUILD_VERSION="${GITHUB_REF_NAME}"
          else
            VERSION_TAG="${GITHUB_REF_NAME}"
            BUILD_VERSION="${GITHUB_SHA::7}"
          fi

          VERSION="${VERSION_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "v_major_minor=v$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          echo "v_major=v$MAJOR" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Determine if latest version tag
        id: check_latest
        if: startsWith(github.ref, 'refs/tags/') || inputs.version_tag != ''
        env:
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          git fetch --tags --quiet
          if [[ -n "$INPUT_VERSION_TAG" ]]; then
            CURRENT_TAG="$INPUT_VERSION_TAG"
          else
            CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          fi
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          echo "Current tag: $CURRENT_TAG, Latest tag: $LATEST_TAG"
          if [[ "$CURRENT_TAG" == "$LATEST_TAG" ]]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels) for push events
        id: meta_push
        if: inputs.version_tag == ''
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
        with:
          images: |
            ${{ env.DOCKER_HUB_NAMESPACE }}/${{ env.DOCKER_HUB_REPOSITORY }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ steps.check_latest.outputs.is_latest == 'true' }}

      - name: Extract metadata (tags, labels) for workflow calls
        id: meta_release
        if: inputs.version_tag != ''
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
        with:
          images: |
            ${{ env.DOCKER_HUB_NAMESPACE }}/${{ env.DOCKER_HUB_REPOSITORY }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.release_context.outputs.version_tag }}
            type=raw,value=${{ steps.release_context.outputs.version }}
            type=raw,value=${{ steps.release_context.outputs.major_minor }}
            type=raw,value=${{ steps.release_context.outputs.major }}
            type=raw,value=${{ steps.release_context.outputs.v_major_minor }}
            type=raw,value=${{ steps.release_context.outputs.v_major }}
            type=raw,value=latest,enable=${{ steps.check_latest.outputs.is_latest == 'true' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PUBLIC_RW_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          METADATA_JSON: ${{ inputs.version_tag != '' && steps.meta_release.outputs.json || steps.meta_push.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$METADATA_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect image
        env:
          TAG: ${{ inputs.version_tag != '' && steps.meta_release.outputs.version || steps.meta_push.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          docker buildx imagetools inspect "ghcr.io/${REPOSITORY}:${TAG}"

      - name: Get manifest digest
        id: manifest
        env:
          TAG: ${{ inputs.version_tag != '' && steps.meta_release.outputs.version || steps.meta_push.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/${REPOSITORY}:${TAG}" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f  # v3.2.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.manifest.outputs.digest }}

      - name: Run Docker Scout Scan
        id: scout-scan
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de  # v1.18.2
        with:
          command: cves
          image: ghcr.io/${{ github.repository }}:${{ inputs.version_tag != '' && steps.meta_release.outputs.version || steps.meta_push.outputs.version }}
          sarif-file: ${{ runner.temp }}/scout-critical-high.sarif
          write-comment: false
          only-severities: critical,high

      - name: Upload Scout results to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@9e907b5e64f6b83e7804b09294d44122997950d6  # v4.32.3
        if: steps.scout-scan.outcome != 'skipped' && steps.scout-scan.outcome != 'cancelled'
        with:
          sarif_file: ${{ runner.temp }}/scout-critical-high.sarif
          category: docker-scout-critical-high
