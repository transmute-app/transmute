<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Transmute" />
    <meta name="theme-color" content="#e32222" />
    <title>Transmute</title>
    <!--
      Blocking theme script — runs synchronously before the browser paints
      anything, eliminating the flash of the default color scheme on refresh.
      `transmute-theme` stores the active theme key; `transmute-theme-registry`
      caches the full custom-theme list so we can synthesize their CSS
      rules before React mounts (otherwise a custom theme would flash the
      default colors until ThemeContext loads).
    -->
    <script>
      (function () {
        var BUILTINS = ['rubedo','citrinitas','viriditas','nigredo','albedo','aurora','caelum','argentum'];
        var TOKENS = ['primary','primary_light','primary_dark','accent','success','success_light','success_dark','surface_dark','surface_light','text','text_muted'];
        function hexToRgb(hex) {
          if (typeof hex !== 'string') return '0 0 0';
          var v = hex.replace(/^#/, '').toLowerCase();
          if (v.length === 3) v = v.split('').map(function (c) { return c + c; }).join('');
          if (!/^[0-9a-f]{6}$/.test(v)) return '0 0 0';
          return parseInt(v.slice(0, 2), 16) + ' ' + parseInt(v.slice(2, 4), 16) + ' ' + parseInt(v.slice(4, 6), 16);
        }
        function injectCachedThemes() {
          try {
            var raw = localStorage.getItem('transmute-theme-registry');
            if (!raw) return [];
            var parsed = JSON.parse(raw);
            var themes = (parsed && parsed.themes) || [];
            if (!themes.length) return [];
            var css = themes.map(function (theme) {
              var safeKey = String(theme.key).replace(/[\\"]/g, '\\$&');
              var decls = TOKENS.map(function (tok) {
                var cssVar = '--color-' + tok.replace(/_/g, '-');
                var hex = theme.colors && theme.colors[tok];
                return '  ' + cssVar + ': ' + hexToRgb(hex) + ';';
              }).join('\n');
              // Use :root[data-theme="…"] (specificity 0,2,0) so the
              // rule beats the bundled :root fallback (specificity 0,1,0)
              // regardless of stylesheet load order.
              return ':root[data-theme="' + safeKey + '"] {\n' + decls + '\n}';
            }).join('\n\n');
            var style = document.createElement('style');
            style.id = 'transmute-custom-themes';
            style.textContent = css;
            document.head.appendChild(style);
            return themes.map(function (t) { return t.key; });
          } catch (e) { return []; }
        }
        try {
          var customKeys = injectCachedThemes();
          var t = localStorage.getItem('transmute-theme');
          if (t && (BUILTINS.indexOf(t) !== -1 || customKeys.indexOf(t) !== -1)) {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
