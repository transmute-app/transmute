<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Transmute" />
    <meta name="theme-color" content="#e32222" />
    <title>Transmute</title>
    <!--
      Blocking theme script — runs synchronously before the browser paints
      anything, eliminating the flash of the default color scheme on refresh.
      localStorage is written by ThemeContext whenever the theme changes;
      the backend API remains the authoritative source of truth.
    -->
    <script>
      (function () {
        var VALID = ['rubedo', 'citrinitas', 'viriditas', 'nigredo', 'albedo', 'aurora', 'caelum'];
        try {
          var t = localStorage.getItem('transmute-theme');
          if (t && VALID.indexOf(t) !== -1) {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
